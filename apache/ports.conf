# =============================================================
# apache/ports.conf  (replaces or appends to /etc/apache2/ports.conf)
# Tells Apache2 to listen on port 8082 in addition to 80/443
#
# Usage – append the Listen line to /etc/apache2/ports.conf:
#   echo "Listen 8082" | sudo tee -a /etc/apache2/ports.conf
#   sudo systemctl reload apache2
# =============================================================

# Default listeners (keep these unless you removed them intentionally)
Listen 80

<IfModule ssl_module>
    Listen 443
</IfModule>

<IfModule mod_gnutls.c>
    Listen 443
</IfModule>

# Custom port for Student Feedback App
Listen 8082
