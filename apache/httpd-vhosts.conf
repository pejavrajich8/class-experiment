# ── Default placeholder (suppress warning) ───────────────────────────────────
<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot "/opt/homebrew/var/www"
    <Directory "/opt/homebrew/var/www">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ── Student Feedback App – port 8082 ─────────────────────────────────────────
<VirtualHost *:8082>
    ServerName   feedback.local
    ServerAlias  www.feedback.local

    DocumentRoot "/opt/homebrew/var/www/student-feedback"

    <Directory "/opt/homebrew/var/www/student-feedback">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Route PHP files through PHP-FPM
    <FilesMatch "\.php$">
        SetHandler  "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    DirectoryIndex index.php index.html

    ErrorLog  "/opt/homebrew/var/log/httpd/student-feedback-error.log"
    CustomLog "/opt/homebrew/var/log/httpd/student-feedback-access.log" combined
</VirtualHost>
