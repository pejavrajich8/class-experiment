# =============================================================
# apache/student-feedback.conf
# Apache2 Virtual Host – Student Feedback App
# Listens on port 8082 (non-standard, not 80 or 443)
#
# Deployment steps (Debian/Ubuntu):
#   sudo cp student-feedback.conf /etc/apache2/sites-available/
#   sudo a2ensite student-feedback.conf
#   sudo a2enmod rewrite
#   sudo systemctl reload apache2
# =============================================================

<VirtualHost *:8082>

    ServerName   feedback.136.119.152.87.nip.io
    ServerAlias  136.119.152.87

    # ── Document root ────────────────────────────────────────
    DocumentRoot /var/www/student-feedback/public

    <Directory /var/www/student-feedback/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── PHP settings (override php.ini per-vhost) ─────────────
    <IfModule mod_php.c>
        php_flag  display_errors  Off
        php_value error_log       /var/log/apache2/student-feedback-php.log
    </IfModule>

    # ── Logging ──────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/student-feedback-error.log
    CustomLog ${APACHE_LOG_DIR}/student-feedback-access.log combined

</VirtualHost>
